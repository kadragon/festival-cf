          - paragraph [ref=e33]: 2026 섬 방문의 해는 대한민국 섬이 지닌 생태·문화적 자산을 새롭게 조명하고, 대한민국을 세계가 주목하는 섬 관광 강국으로의 도약을 본격화한다. 특히, 2026년은 세계 최초로 섬을 주제로 개최되는 '2026 여수세계섬박람회'와 연계하여 더욱 풍성한 볼거리와 즐길거리를 제공한다. 박람회의 열기를 전국 섬으로 확산시키고, 섬 여행비 지원 프로모션부터 문화 주간 행사 등 2026년 한 해 동안 펼쳐지는 다채로운 프로그램을 통해 섬이 선사하는 진정한 휴식과 새로운 활력을 직접 경험할 수 있다.
